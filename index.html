<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#fef6ec;--bg2:#eef4ff;--panel:#ffffff;--ink:#243042;--muted:#7b8aa0;
  --line:#e7ecf5;--soft:#f4f7fc;
  --ok:#2bb673;--warn:#f5a623;--bad:#ef5366;--accent:#5b7cfa;
}
body{font-family:'Noto Sans JP',sans-serif;color:var(--ink);
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  height:100vh;overflow:hidden;user-select:none}
.orbitron{font-family:'Orbitron',monospace}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c8d4ea;border-radius:6px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;
  box-shadow:0 6px 20px rgba(80,110,170,.08)}

/* factory cell */
.fcell{position:relative;border-radius:14px;border:1.5px solid var(--line);
  background:linear-gradient(160deg,#ffffff,#f3f7ff);transition:all .22s ease;overflow:visible}
.fcell.clickable{cursor:pointer}
.fcell.clickable:hover{transform:translateY(-3px);box-shadow:0 10px 22px rgba(91,124,250,.18);border-color:#b9c8f7}
.fcell.sel{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(91,124,250,.22)!important}
.fcell.done{border-color:#bdebd2;background:linear-gradient(160deg,#f4fff9,#eafff2)}
.fcell.done::after{content:'✓';position:absolute;top:6px;right:8px;color:#2bb673;font-weight:900;font-size:13px}

/* problem badge */
.pbadge{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:2.5px solid #fff;z-index:8;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.18);
  animation:pulse 2.1s ease-in-out infinite;transition:transform .16s}
.pbadge:hover{transform:scale(1.22)!important;z-index:20}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}
@media(prefers-reduced-motion:reduce){.pbadge{animation:none}}

/* lens card */
.lcard{position:relative;border-radius:15px;border:2px solid var(--line);background:#fff;
  cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;flex-shrink:0;overflow:hidden}
.lcard:hover:not(.dis){transform:translateY(-8px)}
.lcard.sel{transform:translateY(-10px) scale(1.03)!important}
.lcard.dis{opacity:.5;cursor:not-allowed;filter:saturate(.4)}
.lcard.hintglow{animation:hintglow 1s ease-in-out 3}
@keyframes hintglow{0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,0)}50%{box-shadow:0 0 0 6px rgba(245,166,35,.55)}}
.lcard.fly{animation:fly .5s ease forwards;pointer-events:none}
@keyframes fly{0%{transform:translateY(-10px) scale(1.03)}55%{transform:translateY(-46px) scale(1.08);opacity:.85;filter:brightness(1.3)}100%{transform:translateY(-120px) scale(.5);opacity:0}}

/* kpi bar */
.kfill{height:100%;border-radius:99px;transition:width .9s cubic-bezier(.34,1.4,.64,1);position:relative;overflow:hidden}
.kfill::after{content:'';position:absolute;inset:0 0 0 -100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);animation:shim 2.6s ease-in-out infinite}
@keyframes shim{to{left:200%}}
@media(prefers-reduced-motion:reduce){.kfill{transition:none}.kfill::after{animation:none}}

/* modal */
.ovl{position:fixed;inset:0;z-index:60;background:rgba(36,48,66,.42);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:18px;animation:fin .3s ease}
@keyframes fin{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:22px;box-shadow:0 30px 80px rgba(30,45,80,.3);animation:pop .42s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.8) translateY(24px);opacity:0}to{transform:scale(1);opacity:1}}

.npop{position:fixed;pointer-events:none;z-index:80;font-weight:900;animation:nfly 1.5s ease forwards;text-shadow:0 2px 8px rgba(0,0,0,.15)}
@keyframes nfly{0%{opacity:1;transform:translateY(0) scale(.8)}35%{opacity:1;transform:translateY(-30px) scale(1.15)}100%{opacity:0;transform:translateY(-92px) scale(.7)}}

.evitem{animation:evin .3s ease;border-left:4px solid;border-radius:8px;margin-bottom:5px;background:#fff}
@keyframes evin{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.chip{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:2px 9px;font-size:10.5px;font-weight:700}
.btn{border:none;border-radius:12px;font-weight:700;cursor:pointer;transition:all .18s}
.btn:hover{transform:translateY(-2px)}
.card-row{display:flex;gap:9px;overflow-x:auto;padding:4px 2px 10px;align-items:flex-end}
</style>

<script type="text/babel" data-presets="react">

const LMAP={};LENSES.forEach(l=>LMAP[l.k]=l);

/* ============== Claudeデザイン カードイラスト (SVG) ============== */
function LensArt({k,size=64}){
 const l=LMAP[k];const id='g_'+k;
 const defs=(<defs>
   <linearGradient id={id} x1="0" y1="0" x2="1" y2="1">
     <stop offset="0" stopColor={l.c1}/><stop offset="1" stopColor={l.c2}/>
   </linearGradient>
   <linearGradient id={id+'_l'} x1="0" y1="0" x2="0" y2="1">
     <stop offset="0" stopColor="#ffffff" stopOpacity=".95"/><stop offset="1" stopColor="#ffffff" stopOpacity=".6"/>
   </linearGradient>
 </defs>);
 const P={width:size,height:size,viewBox:'0 0 120 120',fill:'none',xmlns:'http://www.w3.org/2000/svg'};
 const G=`url(#${id})`, W=`url(#${id}_l)`;
 switch(k){
  case 'iru': return(<svg {...P}>{defs}
    <rect x="20" y="46" width="46" height="42" rx="6" fill={G} opacity=".25"/>
    <path d="M24 50 L62 50 M28 88 L58 88" stroke={l.c2} strokeWidth="4" strokeLinecap="round" opacity=".5"/>
    <line x1="22" y1="84" x2="64" y2="50" stroke={l.c2} strokeWidth="5" strokeLinecap="round"/>
    <circle cx="74" cy="50" r="26" fill="#fff" stroke={G} strokeWidth="7"/>
    <path d="M74 38 a8 8 0 0 1 4 15 c-3 2-4 3-4 6" stroke={l.c2} strokeWidth="6" strokeLinecap="round" fill="none"/>
    <circle cx="74" cy="64" r="3.6" fill={l.c2}/>
    <line x1="92" y1="68" x2="104" y2="80" stroke={G} strokeWidth="9" strokeLinecap="round"/>
  </svg>);
  case 'machi': return(<svg {...P}>{defs}
    <path d="M38 26 H82 M38 94 H82" stroke={G} strokeWidth="7" strokeLinecap="round"/>
    <path d="M42 28 C42 48 78 48 78 28 M42 92 C42 72 78 72 78 92" fill={G} opacity=".22"/>
    <path d="M44 30 C46 46 74 46 76 30 Z" fill={G}/>
    <path d="M60 60 L48 90 H72 Z" fill={G} opacity=".85"/>
    <circle cx="60" cy="60" r="4" fill={l.c2}/>
    <g stroke={l.c2} strokeWidth="3.5" strokeLinecap="round"><line x1="60" y1="58" x2="60" y2="50"/><line x1="60" y1="58" x2="67" y2="54"/></g>
  </svg>);
  case 'douji': return(<svg {...P}>{defs}
    <g transform="translate(44 50)"><Gear r="22" fill={G}/></g>
    <g transform="translate(80 74)"><Gear r="16" fill={l.c2} op=".85"/></g>
    <path d="M26 92 H58" stroke={W} strokeWidth="0"/>
    <path d="M22 96 H46 l-6 -6 M50 96 l6 -6 M22 96 l6 6" stroke={l.c2} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
  </svg>);
  case 'kyori': return(<svg {...P}>{defs}
    <circle cx="26" cy="40" r="8" fill={G}/><circle cx="94" cy="84" r="8" fill={l.c2}/>
    <path d="M26 40 C26 80 30 30 94 84" stroke={l.c1} strokeWidth="3" strokeDasharray="5 6" opacity=".5" fill="none"/>
    <path d="M26 40 L94 84" stroke={G} strokeWidth="6" strokeLinecap="round"/>
    <path d="M60 62 l-9 2 3 9" stroke={l.c2} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
  </svg>);
  case 'futai': return(<svg {...P}>{defs}
    <rect x="62" y="20" width="9" height="40" rx="4" fill={l.c2} transform="rotate(32 66 40)"/>
    <path d="M40 78 L70 58 L86 80 L60 96 Z" fill={G}/>
    <path d="M40 78 L60 96" stroke="#fff" strokeWidth="2.5" opacity=".7"/>
    <g fill={l.c1}><circle cx="30" cy="92" r="3"/><circle cx="40" cy="100" r="2.4"/><circle cx="22" cy="100" r="2"/></g>
    <path d="M86 36 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 Z" fill={l.c1}/>
  </svg>);
  case 'kizukai': return(<svg {...P}>{defs}
    <path d="M60 20 L92 32 V58 C92 80 78 92 60 100 C42 92 28 80 28 58 V32 Z" fill={G}/>
    <path d="M60 26 L86 36 V58 C86 76 74 86 60 93 Z" fill="#fff" opacity=".18"/>
    <path d="M46 60 l10 10 20 -24" stroke="#fff" strokeWidth="7" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
  </svg>);
  case 'sokudo': return(<svg {...P}>{defs}
    <path d="M22 84 A40 40 0 0 1 98 84" stroke={l.c1} strokeWidth="10" strokeLinecap="round" opacity=".25" fill="none"/>
    <path d="M22 84 A40 40 0 0 1 52 46" stroke={G} strokeWidth="10" strokeLinecap="round" fill="none"/>

    <g stroke={l.c1} strokeWidth="4" strokeLinecap="round" opacity=".7"><line x1="14" y1="64" x2="26" y2="64"/><line x1="12" y1="76" x2="22" y2="76"/></g>
  </svg>);
  case 'kanri': return(<svg {...P}>{defs}
    <line x1="24" y1="96" x2="100" y2="96" stroke={l.c2} strokeWidth="4" strokeLinecap="round"/>
    <rect x="30" y="68" width="14" height="28" rx="4" fill={G} opacity=".55"/>
    <rect x="52" y="52" width="14" height="44" rx="4" fill={G} opacity=".75"/>
    <rect x="74" y="36" width="14" height="60" rx="4" fill={G}/>
    <path d="M24 44 H100" stroke={l.c1} strokeWidth="3.5" strokeDasharray="6 5"/>
    <circle cx="81" cy="30" r="9" fill="#fff" stroke={l.c2} strokeWidth="4"/>

  </svg>);
  case 'choko': return(<svg {...P}>{defs}
    <g transform="translate(54 56)"><Gear r="30" fill={G}/></g>
    <circle cx="54" cy="56" r="13" fill="#fff"/>
    <path d="M56 46 l-8 14 h7 l-2 12 9 -16 h-7 z" fill={l.c2}/>
    <circle cx="90" cy="86" r="15" fill={l.c1}/>
    <line x1="83" y1="86" x2="97" y2="86" stroke="#fff" strokeWidth="4" strokeLinecap="round"/>
  </svg>);
  case 'cn': return(<svg {...P}>{defs}
    <path d="M60 96 C36 80 34 50 60 28 C70 50 92 54 88 78 C84 96 70 98 60 96 Z" fill={G}/>
    <path d="M60 92 C58 70 64 52 76 42" stroke="#fff" strokeWidth="3.5" strokeLinecap="round" opacity=".8" fill="none"/>
    <path d="M30 40 a18 18 0 1 1 6 22" stroke={l.c2} strokeWidth="5" strokeLinecap="round" fill="none"/>

 }
}
function Gear({r,fill,op=1}){
 const teeth=8,arr=[];for(let i=0;i<teeth;i++){const a=(i/teeth)*Math.PI*2;
  arr.push(<rect key={i} x={-4} y={-r-6} width="8" height="12" rx="2" fill={fill} opacity={op}
    transform={`rotate(${(a*180/Math.PI)})`}/>);}
 return(<g>{arr}<circle r={r} fill={fill} opacity={op}/><circle r={r*0.42} fill="#fff"/></g>);
}

/* ============== 工場マップ ============== */
const CELLS=[
 {id:'recv', nm:'受入・入庫',ic:'📥'},{id:'mc1',nm:'機械加工①',ic:'🔧'},
 {id:'mc2',  nm:'機械加工②',ic:'⚙️'},{id:'cast',nm:'鋳造・ダイカスト',ic:'🔥'},

 {id:'fin',  nm:'完成品倉庫',ic:'🏪'},{id:'ship',nm:'出荷場',  ic:'🚢'},
];
const BADGE_OFF=[[0,-2],[20,12],[-20,12],[14,-14],[-16,-12],[24,-4],[-24,4]];

/* ============== ボス ============== */
const BOSSES=[
 {id:'drg',nm:'品質クレームドラゴン',ic:'🐉',hp:3,c:'#ef5366',
  trig:k=>k.defect>13,desc:'大口顧客から品質クレーム！不良が止まらない…',

/* ============== helpers ============== */
const yfmt=n=>'¥'+(n||0).toLocaleString('ja-JP');
function hintOf(s){
 if(!s)return'';
 const marks=['そこで','改善後は','改善後','改善し','ことで、','する事で','することで','ため、','ので、','為に','為、'];
 let idx=s.length;
 for(const m of marks){const i=s.indexOf(m);if(i>6&&i<idx)idx=i;}
 let h=s.slice(0,idx).trim().replace(/[、。]$/,'');
 if(h.length<10){const p=s.indexOf('。');h=p>0?s.slice(0,p):s.slice(0,46);}
 if(h.length>78)h=h.slice(0,76)+'…';
 return h;
}
const byLens={};LENSES.forEach(l=>byLens[l.k]=[]);
CASES.forEach(c=>{if(byLens[c.l])byLens[c.l].push(c);});
function pickCase(lensKey,used){
 // 出題は金額効果が明記された事例のみ（¥0事例はライブラリ閲覧専用）
 const pool=(byLens[lensKey]||[]).filter(c=>c.y>0);
 const fresh=pool.filter(c=>!used.has(c.id));
 const arr=fresh.length?fresh:pool;
 return arr[Math.floor(Math.random()*arr.length)];
}
// KPIへの効果（実際の年間効果額でスケール）
function effectOf(c){
 const m=c.y>=400000?1.7:c.y>=150000?1.25:0.85;
 const r=(x)=>Math.round(x*m*10)/10;
 const base={profit:0,delivery:0,defect:0,productivity:0,co2:0};
 const add={
  iru:{productivity:r(4),profit:r(1.4)},
  machi:{delivery:r(4),productivity:r(2.5)},
  douji:{productivity:r(4.5),delivery:r(2)},
  kyori:{productivity:r(4),profit:r(1)},
  futai:{productivity:r(3.5),profit:r(1.2)},
  kizukai:{defect:r(-2.4),productivity:r(2)},
  sokudo:{productivity:r(5),delivery:r(2.5)},
  kanri:{defect:r(-1.6),delivery:r(2.5),profit:r(1.2)},
  choko:{productivity:r(3.2),defect:r(-1.6)},
  cn:{profit:r(1.6),co2:-r(5)},
 }[c.l]||{};
 return {...base,...add};
}
/* ============== 役職（10段階）＝3改善ごとの昇進 ============== */
const RANKS=[
 {nm:'班長',      ic:'🧢',c:'#36c95f'},
 {nm:'係長',      ic:'📋',c:'#16c79a'},
 {nm:'課長',      ic:'📈',c:'#3d8bf7'},
 {nm:'次長',      ic:'🗂️',c:'#5b7cfa'},
 {nm:'部長',      ic:'🏢',c:'#7c5cf0'},
 {nm:'執行役員',  ic:'🎖️',c:'#9775fa'},
 {nm:'常務取締役',ic:'🥈',c:'#c05cf0'},
 {nm:'専務取締役',ic:'🥇',c:'#f7689f'},
 {nm:'社長',      ic:'👔',c:'#ff7a3d'},
 {nm:'会長',      ic:'👑',c:'#f5a623'},
];
// 3改善(=1チェックポイント)ごとの「累計改善額 必達ライン」。未達でゲームオーバー
// ※実事例の金額分布(中央値¥127k)からモンテカルロで難易度調整：CP1突破≈94%、会長到達≈48%
const CP_TARGETS=[220000,600000,1040000,1560000,2140000,2750000,3430000,4160000,4900000,5700000];
const CP_EVERY=3;          // 3ターンごと
const MAX_NG=3;            // NG3回でゲームオーバー
const GOAL_YEN=CP_TARGETS[CP_TARGETS.length-1];

/* ============== ランキング（localStorage） ============== */
const LB_KEY='imadoki_ranking_v1';
function loadLB(){try{return JSON.parse(localStorage.getItem(LB_KEY)||'[]');}catch(e){return [];}}
function saveLB(entry){
 const lb=loadLB().map(e=>{const{_new,...r}=e;return r;});
 lb.push(entry);
 lb.sort((a,b)=>b.rank-a.rank||b.yen-a.yen||a.solves-b.solves);
 const top=lb.slice(0,30);
 try{localStorage.setItem(LB_KEY,JSON.stringify(top));}catch(e){}
 return top;
}
// 次のチェックポイント情報
function nextCP(solves){
 const passed=Math.floor(solves/CP_EVERY);
 if(passed>=CP_TARGETS.length) return null;
 return {cpNo:passed+1,target:CP_TARGETS[passed],
   remSolves:CP_EVERY-(solves%CP_EVERY),rank:RANKS[passed]};
}

/* ============== state ============== */
const INIT_KPI={profit:6.5,delivery:72,defect:8.5,productivity:58};
function spawnProblems(n,used,occupied){
 const out=[];const cells=CELLS.map(c=>c.id).filter(id=>!occupied.includes(id));
 const lkeys=LENSES.map(l=>l.k);
 for(let i=0;i<n&&cells.length;i++){
  const lens=lkeys[Math.floor(Math.random()*lkeys.length)];
  const c=pickCase(lens,used);if(!c)continue;
  const ci=Math.floor(Math.random()*cells.length);const cell=cells.splice(ci,1)[0];
  out.push({pid:'p'+c.id+'_'+i+'_'+occupied.length,lens,cell,caseId:c.id,case:c,sev:Math.ceil(Math.random()*3),tries:0});
  used.add(c.id);
 }
 return out;
}
function mkState(phase){
 const used=new Set();
 const problems=spawnProblems(7,used,[]);
 return {phase:phase||'name',playerName:'',
  turn:1,solves:0,ng:0,rank:0,ip:10,kpi:{...INIT_KPI},co2:100,revenue:8500,totalYen:0,score:0,combo:0,
  problems,used:[...used],lensCount:Object.fromEntries(LENSES.map(l=>[l.k,0])),
  solved:[],selProblem:null,selLens:null,hintFor:null,reveal:null,promo:null,overReason:null,
  events:[{id:'e0',tp:'start',msg:'🏭 工場改革スタート！現場のムダを「観察の型」で見抜こう'}],
  boss:null,bossDefeated:[],pops:[],library:false};
}
function clampKpi(k){return{profit:Math.min(35,Math.max(0,k.profit)),delivery:Math.min(100,Math.max(0,k.delivery)),
 defect:Math.min(30,Math.max(0,k.defect)),productivity:Math.min(100,Math.max(0,k.productivity))};}

function reducer(s,a){
 switch(a.type){
  case 'SET_NAME': return {...s,playerName:a.name};
  case 'START': return {...mkState('play'),playerName:(a.name||'').trim()||'ゲスト'};
  case 'CLOSE_PROMO': return {...s,promo:null};
  case 'TOGGLE_LIB': return {...s,library:!s.library};
  case 'SEL_PROBLEM':
   if(s.boss)return s;
   return {...s,selProblem:s.selProblem?.pid===a.p.pid?null:a.p,selLens:null,hintFor:null};
  case 'SEL_LENS':
   if(s.boss)return s;
   return {...s,selLens:s.selLens===a.k?null:a.k};
  case 'HINT':{
   if(!s.selProblem||s.ip<3)return s;
   return {...s,ip:s.ip-3,hintFor:s.selProblem.lens};
  }
  case 'CLOSE_REVEAL': return {...s,reveal:null};
  case 'APPLY':{
   const p=s.selProblem,lk=s.selLens;
   if(!p||!lk||s.phase!=='play')return s;
   if(lk!==p.lens){
    // 誤った視点＝NG
    const ng=s.ng+1;
    const np=s.problems.map(x=>x.pid===p.pid?{...x,tries:x.tries+1}:x);
    if(ng>=MAX_NG){
     return {...s,ng,phase:'over',selLens:null,overReason:{type:'ng'},
      events:[{id:'e'+Date.now(),tp:'over',msg:`❌ NG ${MAX_NG}回でアウト…ゲームオーバー`},...s.events].slice(0,24)};
    }
    const msg=`🔎 NG ${ng}/${MAX_NG}：「${LMAP[lk].label}」では見つけにくい…観察視点を変えよう`;
    return {...s,ng,problems:np,selLens:null,
     events:[{id:'e'+Date.now(),tp:'miss',msg},...s.events].slice(0,24)};
   }
   // 正解
   const c=p.case;const fx=effectOf(c);
   let kpi={...s.kpi};
   kpi.profit+=fx.profit;kpi.delivery+=fx.delivery;kpi.defect+=fx.defect;kpi.productivity+=fx.productivity;
   kpi=clampKpi(kpi);
   const co2=Math.max(40,s.co2+(fx.co2||0));
   const totalYen=s.totalYen+(c.y||0);
   const combo=s.combo+1;
   const ipGain=2+(c.y>=400000?2:c.y>=150000?1:0)+(combo>=3?1:0);
   const revenue=Math.round(s.revenue*(1+fx.profit*0.012)+ (c.y||0)/10000);
   const lensCount={...s.lensCount,[p.lens]:s.lensCount[p.lens]+1};
   const used=new Set(s.used);
   const occupied=s.problems.filter(x=>x.pid!==p.pid).map(x=>x.cell);
   let rest=s.problems.filter(x=>x.pid!==p.pid);
   const solves=s.solves+1;
   const turn=s.turn+1;
   let add=[];
   if(rest.length<7){add=spawnProblems(1,used,occupied);}
   const cellNm=CELLS.find(x=>x.id===p.cell)?.nm||'';
   let events=[{id:'e'+Date.now(),tp:'ok',
    msg:`✅[${cellNm}] ${LMAP[p.lens].kana}「${LMAP[p.lens].label}」で改善！ ${yfmt(c.y)}/年`,fx},...s.events].slice(0,24);
   // ボス出現：チェックポイントを避けて 6改善ごと(4,10,16,22,28)に襲来
   let boss=s.boss;
   if(!boss&&solves%6===4){const nx=BOSSES.find(b=>!s.bossDefeated.includes(b.id));if(nx)boss={...nx,curHp:nx.hp};}
   // チェックポイント判定（3改善ごと）
   let phase='play',rank=s.rank,promo=null,overReason=null,reveal={case:c,lens:p.lens,fx,cellNm};
   if(solves%CP_EVERY===0){
    const cp=solves/CP_EVERY;                 // 1..10
    const target=CP_TARGETS[cp-1];
    if(totalYen>=target){
     rank=cp;const rk=RANKS[cp-1];reveal=null;
     if(cp>=RANKS.length){
      phase='win';boss=null;
      events=[{id:'e'+Date.now()+'w',tp:'win',msg:`👑 全チェックポイント突破！『${rk.nm}』に就任！工場改革コンプリート`},...events].slice(0,24);
     }else{
      promo={rank:cp,rk,nextTarget:CP_TARGETS[cp]};
      events=[{id:'e'+Date.now()+'p',tp:'win',msg:`🎉 昇進！『${rk.nm}』に任命（CP${cp}：${yfmt(totalYen)}達成）`},...events].slice(0,24);
     }
    }else{
     phase='over';boss=null;reveal=null;
     overReason={type:'cp',cp,target,have:totalYen};
     events=[{id:'e'+Date.now()+'o',tp:'over',msg:`💥 CP${cp}の必達ライン未達（${yfmt(totalYen)}／${yfmt(target)}）…ゲームオーバー`},...events].slice(0,24);
    }
   }
   return {...s,phase,turn,solves,rank,kpi,co2,totalYen,revenue,combo,score:s.score+Math.round((c.y||0)/1000)+combo*5,
    ip:s.ip+ipGain,problems:[...rest,...add],used:[...used],lensCount,
    solved:[{id:c.id,lens:p.lens,case:c},...s.solved].slice(0,200),
    selProblem:null,selLens:null,hintFor:null,reveal,promo,overReason,
    events,boss};
  }
  case 'BOSS_ATK':{
   if(!s.boss)return s;const at=s.boss.atk;let kpi={...s.kpi};
   kpi.profit+=at.profit||0;kpi.delivery+=at.delivery||0;kpi.defect+=at.defect||0;kpi.productivity+=at.productivity||0;
   kpi=clampKpi(kpi);const co2=Math.min(160,s.co2+(s.boss.co2||0));
   return {...s,kpi,co2,combo:0,events:[{id:'e'+Date.now(),tp:'boss',msg:`⚠️ ${s.boss.nm}の攻撃！KPIが悪化`},...s.events].slice(0,24)};
  }
  case 'BOSS_HIT':{
   if(!s.boss)return s;
   if(!s.boss.weak.includes(a.k)){
    return {...s,events:[{id:'e'+Date.now(),tp:'miss',msg:`🛡️ ${LMAP[a.k].label}は弱点ではない！`},...s.events].slice(0,24)};
   }
   const hp=s.boss.curHp-1;
   if(hp<=0){
    const r=s.boss.rwd;let kpi={...s.kpi};
    kpi.profit+=r.profit||0;kpi.delivery+=r.delivery||0;kpi.defect+=r.defect||0;kpi.productivity+=r.productivity||0;
    kpi=clampKpi(kpi);const co2=Math.max(40,s.co2+(s.boss.rco2||0));
    return {...s,kpi,co2,boss:null,ip:s.ip+6,bossDefeated:[...s.bossDefeated,s.boss.id],
     events:[{id:'e'+Date.now(),tp:'win',msg:`🏆 ${s.boss.nm}を撃退！ 報酬獲得`},...s.events].slice(0,24)};
   }
   return {...s,boss:{...s.boss,curHp:hp},
    events:[{id:'e'+Date.now(),tp:'ok',msg:`⚔️ ${LMAP[a.k].label}が弱点に命中！ 残りHP${hp}`},...s.events].slice(0,24)};
  }
  case 'ADD_POP': return {...s,pops:[...s.pops,a.pop].slice(-6)};
  case 'RM_POP': return {...s,pops:s.pops.filter(p=>p.id!==a.id)};
  case 'RESTART': return mkState();
  default: return s;
 }
}

function KBar({label,value,max,rev,fmt,good}){
 const pct=Math.max(0,Math.min(100,(value/max)*100));
 const disp=rev?100-pct:pct;
 const col=good(value)?'var(--ok)':disp>(rev?60:40)?'var(--warn)':'var(--bad)';
 return(<div style={{marginBottom:9}}>
  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
   <span style={{fontSize:11,color:'var(--muted)',fontWeight:700}}>{label}</span>
   <span className="orbitron" style={{fontSize:13,fontWeight:800,color:col}}>{fmt(value)}</span>
  </div>
  <div style={{height:8,background:'#eef2f9',borderRadius:99,overflow:'hidden'}}>
   <div className="kfill" style={{width:disp+'%',background:`linear-gradient(90deg,${col},${col})`}}/>
  </div>
 </div>);
}
function ProblemBadge({p,onClick}){
 const l=LMAP[p.lens];const i=Math.abs(hash(p.pid))%7;const[ox,oy]=BADGE_OFF[i];
 const sz=p.sev===3?32:p.sev===2?27:23;
 return(<div className="pbadge" onClick={e=>{e.stopPropagation();onClick(p);}}
   title="クリックして観察"
   style={{width:sz,height:sz,top:`calc(50% + ${oy}px)`,left:`calc(50% + ${ox}px)`,
    transform:'translate(-50%,-50%)',background:'linear-gradient(150deg,#fff,#fff5f5)',
    color:'#ef5366',fontSize:sz*0.5,animationDelay:(i*0.35)+'s'}}>⚠️</div>);
}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}return h;}

/* ============== MAIN ============== */
function App(){
 const [s,dispatch]=useReducer(reducer,null,mkState);
 const [fly,setFly]=useState(null);
 const popId=useRef(0);

 const apply=useCallback(()=>{
  if(!s.selProblem||!s.selLens)return;
  if(s.selLens===s.selProblem.lens){
   setFly(s.selLens);
   const c=s.selProblem.case;
   const p={id:++popId.current,text:'+'+yfmt(c.y),x:innerWidth*0.42,y:innerHeight*0.5,col:'#1c9c5e'};
   dispatch({type:'ADD_POP',pop:p});
   setTimeout(()=>dispatch({type:'RM_POP',id:p.id}),1500);
   setTimeout(()=>{dispatch({type:'APPLY'});setFly(null);},480);
  }else{dispatch({type:'APPLY'});}
 },[s.selProblem,s.selLens]);

 const recorded=useRef(false);
 const [,forceLB]=useState(0);
 useEffect(()=>{
  if((s.phase==='over'||s.phase==='win')&&!recorded.current){
   recorded.current=true;
   saveLB({name:s.playerName||'ゲスト',rank:s.rank,rankName:s.rank>0?RANKS[s.rank-1].nm:'担当',
     yen:s.totalYen,solves:s.solves,score:s.score,_new:true});
   forceLB(x=>x+1);
  }
  if(s.phase==='play'||s.phase==='name') recorded.current=false;
 },[s.phase]);

 const pmap={};CELLS.forEach(c=>pmap[c.id]=s.problems.filter(p=>p.cell===c.id));
 const usedL=Object.values(s.lensCount).filter(v=>v>0).length;
 const cp=nextCP(s.solves);

 if(s.phase==='name')return <NameScreen dispatch={dispatch}/>;
 if(s.phase==='win') return <WinScreen s={s} dispatch={dispatch}/>;
 if(s.phase==='over')return <GameOverScreen s={s} dispatch={dispatch}/>;

 return(<div style={{height:'100vh',display:'grid',gridTemplateRows:'52px 1fr',overflow:'hidden'}}>
  {/* HEADER */}
  <div style={{display:'flex',alignItems:'center',gap:10,padding:'0 16px',background:'rgba(255,255,255,.8)',
    backdropFilter:'blur(8px)',borderBottom:'1px solid var(--line)'}}>
   <span style={{fontSize:20}}>🏭</span>
   <span style={{fontSize:14,fontWeight:900,background:'linear-gradient(135deg,#5b7cfa,#9775fa)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',whiteSpace:'nowrap'}}>イマドキフキソカチのムダ取り工場</span>
   <RankBadge rank={s.rank}/>
   <span className="chip orbitron" style={{background:'#eef3ff',color:'#5b7cfa',fontWeight:800}}>TURN {s.solves}</span>
   <div style={{flex:1}}/>
   {/* NG */}
   <div style={{display:'flex',alignItems:'center',gap:3,marginRight:2}} title={`NG ${s.ng}/${MAX_NG}`}>
    <span style={{fontSize:8.5,color:'#9aa7bd',fontWeight:700,marginRight:2}}>NG</span>
    {[0,1,2].map(i=><span key={i} style={{fontSize:13}}>{i<s.ng?'❌':'⭕'}</span>)}
   </div>
   <Stat label="累計改善額" value={yfmt(s.totalYen)} color="#1c9c5e" big/>
   <Stat label="売上" value={'¥'+s.revenue.toLocaleString()+'万'} color="#2bb673"/>
   <span className="chip" style={{background:'#eef3ff',color:'#5b7cfa',fontWeight:800}}>💡 {s.ip} IP</span>
   <button className="btn" onClick={()=>dispatch({type:'TOGGLE_LIB'})} style={{background:'var(--soft)',padding:'6px 12px',fontSize:12,color:'#5b7cfa'}}>📚 事例</button>
   <button className="btn" onClick={()=>{if(confirm('最初の画面に戻りますか？（現在の記録は保存されません）'))dispatch({type:'RESTART'})}} style={{background:'var(--soft)',padding:'6px 10px',fontSize:13,color:'var(--muted)'}}>↺</button>
  </div>

  {/* BODY */}
  <div style={{display:'grid',gridTemplateColumns:'1fr 230px',overflow:'hidden'}}>
   {/* LEFT */}
   <div style={{display:'flex',flexDirection:'column',gap:9,padding:'12px',overflow:'hidden'}}>
    {/* map */}
    <div className="panel" style={{flex:'1 1 auto',minHeight:0,padding:12,display:'flex',flexDirection:'column'}}>
     <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
      🏭 工場マップ <span style={{fontWeight:500}}>— ⚠️をクリックして現場を観察</span>
      <span style={{flex:1}}/>
      <span style={{fontSize:10,fontWeight:700,color:'#9775fa'}}>制覇視点 {usedL}/10</span>
     </div>
     <div style={{flex:1,minHeight:0,display:'grid',gridTemplateColumns:'repeat(4,1fr)',gridTemplateRows:'repeat(3,1fr)',gap:8}}>
      {CELLS.map(c=><FCell key={c.id} cell={c} problems={pmap[c.id]||[]}
        sel={s.selProblem?.cell===c.id} done={false}
        onP={p=>dispatch({type:'SEL_PROBLEM',p})}/>)}
     </div>
    </div>

    {/* action bar */}
    <div className="panel" style={{padding:'10px 14px',flexShrink:0,minHeight:58,display:'flex',flexDirection:'column',gap:8,justifyContent:'center'}}>
     {s.selProblem?(<>
      <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
       <span className="chip" style={{background:'#ffeef1',color:'#e0455e',flexShrink:0,marginTop:1}}>⚠️ 現場の困りごと</span>
       <span title={s.selProblem.case.d} style={{fontSize:12.5,color:'#33405a',flex:1,minWidth:0,lineHeight:1.45}}>「{hintOf(s.selProblem.case.d)}」</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
       <span style={{fontSize:11,color:'#93a1b8',flexShrink:0}}>この困りごとは、どの観察視点で見抜ける？</span>
       <span style={{flex:1}}/>
       <button className="btn" onClick={()=>dispatch({type:'HINT'})} disabled={s.ip<3||s.hintFor}
         style={{background:s.ip>=3&&!s.hintFor?'#fff6e9':'var(--soft)',color:'#f5a623',padding:'6px 11px',fontSize:11,opacity:s.ip<3?.5:1,flexShrink:0}}>💡 ヒント(3IP)</button>
       {s.selLens?(
        <button className="btn" onClick={apply} style={{padding:'8px 20px',color:'#fff',fontSize:13.5,flexShrink:0,whiteSpace:'nowrap',
          background:`linear-gradient(135deg,${LMAP[s.selLens].c1},${LMAP[s.selLens].c2})`}}>⚡ {LMAP[s.selLens].label}で改善！</button>
       ):(<span style={{fontSize:12,color:'var(--muted)',flexShrink:0}}>↓ カードを選ぶ</span>)}
      </div>
     </>):(
      <span style={{fontSize:12.5,color:'var(--muted)'}}>🔍 工場マップの <b style={{color:'#ef5366'}}>⚠️</b> をクリックして現場のムダを観察しよう</span>
     )}
    </div>

    {/* lens deck */}
    <div className="panel" style={{padding:'8px 12px',flexShrink:0}}>
     <div style={{fontSize:10.5,fontWeight:800,color:'var(--muted)',marginBottom:2}}>🃏 観察視点カード（イマドキフキソカチ＋CN）— あなたの永続ツール</div>
     <div className="card-row">
      {LENSES.map(l=>(
       <div key={l.k} style={{position:'relative'}}>
        <LensCard l={l} sel={s.selLens===l.k} dis={!s.selProblem}
          hint={s.hintFor===l.k} fly={fly===l.k}
          onSel={k=>dispatch({type:'SEL_LENS',k})}/>
        {s.lensCount[l.k]>0&&<span style={{position:'absolute',top:-6,right:-4,background:'#2bb673',color:'#fff',

       </div>))}
     </div>
    </div>
   </div>

   {/* RIGHT */}
   <div style={{display:'flex',flexDirection:'column',gap:9,padding:'12px 12px 12px 0',overflow:'hidden'}}>

     <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',marginBottom:8}}>📊 KPIダッシュボード</div>

     <KBar label="納期遵守率" value={s.kpi.delivery} max={100} fmt={v=>v.toFixed(0)+'%'} good={v=>v>=88}/>

    <div className="panel" style={{padding:12,flexShrink:0}}>
     <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>🎖️ 昇進トラッカー <span style={{flex:1}}/><span style={{fontSize:10,color:'#9775fa',fontWeight:700}}>{s.rank}/10 役職</span></div>
     {cp?(()=>{
       const reached=Math.min(100,Math.round(s.totalYen/cp.target*100));

    </div>
    <div className="panel" style={{padding:12,flex:1,minHeight:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
     <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',marginBottom:6}}>📋 改善ログ{s.combo>1&&<span style={{color:'#f5a623',marginLeft:6}}>🔥{s.combo}連続</span>}</div>
     <div style={{overflowY:'auto',flex:1}}>
      {s.events.map(ev=>{const col={start:'#5b7cfa',ok:'#2bb673',boss:'#ef5366',win:'#f5a623',miss:'#f5a623',over:'#ef5366'}[ev.tp]||'#9aa7bd';
       return(<div key={ev.id} className="evitem" style={{borderColor:col,padding:'6px 9px'}}>
        <div style={{fontSize:10.5,color:'#42506a',lineHeight:1.4}}>{ev.msg}</div>
        {ev.fx&&<div style={{marginTop:3,display:'flex',gap:6,flexWrap:'wrap'}}>{fxList(ev.fx)}</div>}
       </div>);})}
     </div>
    </div>
   </div>
  </div>

  {s.reveal&&<RevealModal reveal={s.reveal} dispatch={dispatch}/>}
  {s.promo&&<PromoModal promo={s.promo} dispatch={dispatch}/>}
  {s.library&&<LibraryModal solved={s.solved} dispatch={dispatch}/>}
  {s.boss&&<BossModal boss={s.boss} dispatch={dispatch}/>}
  {s.pops.map(p=><div key={p.id} className="npop orbitron" style={{left:p.x,top:p.y,color:p.col,fontSize:22}}>{p.text}</div>)}
 </div>);
}
function Stat({label,value,color,big}){
 return(<div style={{textAlign:'right',marginRight:4}}>
  <div style={{fontSize:8.5,color:'#9aa7bd',fontWeight:700}}>{label}</div>
  <div className="orbitron" style={{fontSize:big?14:12,fontWeight:800,color}}>{value}</div>
 </div>);
}
function Goal({label,cur,ok,tgt}){
 return(<div style={{display:'flex',alignItems:'center',gap:6,marginBottom:5,fontSize:10.5}}>
  <span style={{color:ok?'#2bb673':'#cbd5e6',fontWeight:900}}>{ok?'✓':'○'}</span>
  <span style={{color:'#5a6a82',flex:1}}>{label}</span>
  <span style={{fontWeight:800,color:ok?'#2bb673':'#7b8aa0'}}>{cur}{tgt&&!ok?` / ${tgt}`:''}</span>
 </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
